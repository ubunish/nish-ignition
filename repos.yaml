# vcstool manifest — Nish's own repos, cloned into ~/code by nish-ignition.
# Imported with: vcs import ~/code < repos.yaml
# SSH urls require the ssh-key step to have run and the key to be on GitHub.
repositories:
  nish-aliases:
    type: git
    url: git@github.com:ubunish/nish-aliases.git
    version: main
  nish-ai:
    type: git
    url: git@github.com:ubunish/nish-ai.git
    version: main
  fm-ros2:
    type: git
    url: git@github.com:ubunish/fm-ros2.git
    version: main
